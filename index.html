<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сакен Дилімбет — WhatsApp топ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: -apple-system, 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* full-bleed photo */
  .photo {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 0;
  }

  /* dark gradient overlay — bottom heavy */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.1) 40%,
      rgba(0,0,0,0.75) 65%,
      rgba(0,0,0,0.95) 100%
    );
    z-index: 1;
  }

  /* content sits above overlay */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0 24px 52px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .call-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: center;
  }

  .call-text strong {
    color: #ffffff;
    font-weight: 900;
    font-size: 20px;
    line-height: 1.25;
    display: block;
  }

  .call-text span {
    color: rgba(255,255,255,0.8);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.45;
    display: block;
  }

  .call-text .sub {
    color: #6dd97e;
    font-size: 14px;
    font-weight: 600;
    display: block;
  }

  /* WhatsApp CTA */
  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 400px;
    padding: 20px 28px;
    background: #25d366;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(37,211,102,0.5), 0 4px 20px rgba(0,0,0,0.4);
  }

  /* pulsing outer ring */
  .cta::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 22px;
    border: 3px solid rgba(37,211,102,0.7);
    animation: pulse 2s ease-out infinite;
  }

  /* shimmer sweep */
  .cta::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 55%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(1);    opacity: 0.9; }
    70%  { transform: scale(1.07); opacity: 0; }
    100% { transform: scale(1.07); opacity: 0; }
  }

  @keyframes shimmer {
    0%   { left: -100%; }
    55%  { left: 150%; }
    100% { left: 150%; }
  }

  .cta svg {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .cta span {
    position: relative;
    z-index: 1;
  }
</style>
</head>
